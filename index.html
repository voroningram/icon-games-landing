<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="icon.games">
    <meta name="theme-color" content="#07080c">
    <title>icon.games</title>

    <style>
      :root {
        color-scheme: dark;
        --frame-size: min(31vw, 150px);
        --bg: #07080c;
        --text: #f7efe4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 22%, rgba(103, 62, 214, 0.26), transparent 24rem),
          radial-gradient(circle at 76% 28%, rgba(35, 129, 184, 0.2), transparent 25rem),
          radial-gradient(circle at 45% 82%, rgba(190, 48, 42, 0.2), transparent 28rem),
          radial-gradient(circle at 82% 78%, rgba(41, 145, 113, 0.18), transparent 24rem),
          linear-gradient(145deg, #151018 0%, #08090d 48%, #030407 100%);
        background-size: 140% 140%;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        animation: gradient-drift 16s ease-in-out infinite alternate;
      }

      main {
        display: grid;
        justify-items: center;
        gap: 2rem;
        padding: 2rem;
      }

      .runner {
        width: var(--frame-size);
        height: var(--frame-size);
        background-image: url("images/spritesheet-player-run.png");
        background-repeat: no-repeat;
        background-size: 400% 400%;
        filter: drop-shadow(0 1.6rem 2.5rem rgba(0, 0, 0, 0.45));
      }

      a {
        color: rgba(247, 239, 228, 0.82);
        font-size: clamp(0.95rem, 2.5vw, 1.05rem);
        letter-spacing: 0.02em;
        text-decoration: none;
      }

      a:hover {
        color: #ffffff;
      }

      @keyframes gradient-drift {
        0% {
          background-position: 0% 45%;
        }

        50% {
          background-position: 70% 35%;
        }

        100% {
          background-position: 100% 70%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body {
          animation: none;
        }

        .runner {
          background-position: 0 0;
        }
      }
    </style>
  </head>

  <body>
    <main aria-label="icon.games parking page">
      <div class="runner" aria-hidden="true"></div>
      <a href="mailto:team@icon.games">team@icon.games</a>
    </main>

    <script>
      const runner = document.querySelector(".runner");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      const frameDuration = 65;
      const frames = [
        [0, 0],
        [1, 0],
        [2, 0],
        [3, 0],
        [0, 1],
        [1, 1],
        [2, 1],
        [3, 1],
        [0, 2],
        [1, 2],
        [2, 2],
        [3, 2],
        [0, 3],
        [1, 3],
        [2, 3],
      ];
      let frame = 0;
      let previousTime = 0;

      function showFrame([column, row]) {
        const size = runner.clientWidth;
        runner.style.backgroundSize = `${size * 4}px ${size * 4}px`;
        runner.style.backgroundPosition = `-${column * size}px -${row * size}px`;
      }

      showFrame(frames[0]);

      window.addEventListener("resize", () => {
        showFrame(frames[frame]);
      });

      if (!reduceMotion.matches) {
        function animate(time) {
          if (!previousTime) {
            previousTime = time;
          }

          if (time - previousTime >= frameDuration) {
            frame = (frame + 1) % frames.length;
            showFrame(frames[frame]);
            previousTime = time;
          }

          window.requestAnimationFrame(animate);
        }

        window.requestAnimationFrame(animate);
      }
    </script>
  </body>
</html>
